<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Irrigation Digital Twin</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        #dashboard { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            color: #e0e0e0; 
            background: rgba(30, 30, 30, 0.85); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            min-width: 260px;
            z-index: 10;
        }
        h3 { margin-top: 0; color: #4a90e2; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
        .data-field { margin: 12px 0; font-size: 14px; font-family: monospace; }
        .value { font-weight: bold; color: #00ffcc; float: right; }
        input[type=range] { width: 100%; margin-top: 5px; cursor: pointer; }

        /* --- NEW: Critical Alert Banner --- */
        #alert-banner {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(231, 76, 60, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; /* Hidden by default */
            z-index: 100;
            text-align: center;
        }
        .flash { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

    </script>

            if (simState.moisture < 20) {
                alertBanner.style.display = 'block';
                alertBanner.style.backgroundColor = 'rgba(231, 76, 60, 0.9)';
                alertBanner.innerText = '⚠️ CRITICAL: SOIL MOISTURE LOW';
            } else {
                alertBanner.style.display = 'none';
            }

            surfaceWater.visible = simState.moisture > 80;

            // Soil Color Lerp
            if (soilMesh) {
                const dry = new THREE.Color(0xd2b48c); 
                const wet = new THREE.Color(0x3e2723); 
                soilMesh.material.color.lerpColors(dry, wet, simState.moisture / 100);
            }

            // Manage inner water transparency based on flow
            if (simState.flowRate > 0.5) {
                innerWaterMaterial.opacity = 0.4 + (flowRatio * 0.4);
                if (!simState.isBroken) waterStreamDrop.material.opacity = 0.4 + (flowRatio * 0.4);
            } else {
                innerWaterMaterial.opacity = 0;
                waterStreamDrop.material.opacity = 0;
            }
        }

        function triggerPipeBurst() {
            alertBanner.style.display = 'block';
            alertBanner.style.backgroundColor = 'rgba(192, 57, 43, 0.9)';
            alertBanner.innerText = '🚨 SYSTEM FAILURE: PIPE BURST DETECTED';
            
            // Drop the broken pipe visually
            pipeMid.position.y = -5; // Drop out of view
            waterMid.opacity = 0; // Water disappears inside the middle pipe
            waterStreamDrop.material.opacity = 0; // Stops flowing to soil
            
            // Massive leak spray
            leakSpray.visible = true;
            leakSpray.scale.set(3, 3, 3); // Huge water explosion
        }

        // --- 8. RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            waterTexture.offset.y -= (simState.flowRate / 30.0) * 0.05;

            // Jitter for falling stream and leaks
            if (waterStreamDrop.material.opacity > 0) {
                waterStreamDrop.scale.set(1, 1, 1).multiplyScalar(0.9 + Math.random() * 0.2);
            }
            if (leakSpray.visible) {
                let baseSize = simState.isBroken ? 3 : 1;
                leakSpray.scale.set(baseSize + Math.random()*0.3, baseSize + Math.random()*0.5, baseSize + Math.random()*0.3);
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
